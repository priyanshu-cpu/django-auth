{% extends "auth/base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow p-4">
                <h3 class="text-center mb-4">Login</h3>

                <form method="POST">
                    {% csrf_token %}

                    {% if form.non_field_errors %}
                        <div class="alert alert-danger">
                            {{ form.non_field_errors }}
                        </div>
                    {% endif %}

                    <div data-mdb-input-init class="form-outline mb-4">
                  <input type="text" id="loginUsername" class="form-control form-control-lg" name="username" required />
                  <label class="form-label" for="loginUsername">Your Name</label>
                </div>

                <!-- Password -->
                <div data-mdb-input-init class="form-outline mb-4">
                  <input type="password" id="loginPassword" class="form-control form-control-lg" name="password" required />
                  <label class="form-label" for="loginPassword">Password</label>
                </div>

                <!-- Submit -->
                <div class="d-flex justify-content-center">
                  <button type="submit"
                    class="btn btn-success btn-block btn-lg gradient-custom-4 text-body">
                    Login
                  </button>
                </div>
                </form>

                <p class="text-center mt-3 mb-0">
                    Don't have an account?
                    <a href="{% url 'register' %}">Register</a>
                </p>

            </div>
        </div>
    </div>
</div>

{% endblock %}
